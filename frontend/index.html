<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream</title>

    <!-- hls.js lets Chrome/Firefox play HLS (Safari has native support) -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: sans-serif;
            background: #0f0f0f;
            color: #fff;
            padding: 24px;
        }

        h2 {
            font-size: 14px;
            font-weight: 500;
            color: #aaa;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .videos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        video {
            width: 100%;
            aspect-ratio: 16/9;
            background: #1a1a1a;
            border-radius: 8px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        button {
            padding: 10px 28px;
            border-radius: 6px;
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        #startBtn { background: #1DB954; color: #fff; }
        #stopBtn  { background: #e74c3c; color: #fff; }

        #status {
            font-size: 13px;
            color: #888;
            margin-left: 4px;
        }

        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #888;
            margin-right: 6px;
            vertical-align: middle;
        }

        .dot.live { background: #e74c3c; animation: pulse 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }
    </style>
</head>
<body>

<div class="videos">
    <div>
        <h2>Your camera (preview)</h2>
        <video id="localVideo" autoplay muted playsinline></video>
    </div>
    <div>
        <h2>Live playback (HLS)</h2>
        <video id="remoteVideo" controls playsinline></video>
    </div>
</div>

<div class="controls">
    <button id="startBtn">Start Stream</button>
    <button id="stopBtn" disabled>Stop Stream</button>
    <span id="status"><span class="dot" id="dot"></span>Ready</span>
</div>

<script>
    // ── Config ──────────────────────────────────────────────────
    // Change these to match your actual user and stream identifiers
    const USER_ID   = "user123";
    const STREAM_ID = "stream001";

    // WebSocket URL — connects to Spring Boot on port 8080
    const WS_URL  = `ws://localhost:8080/stream/${USER_ID}/${STREAM_ID}`;

    // HLS URL — Nginx serves this on port 8090
    // Nginx writes files to /var/www/hls/user123_stream001/index.m3u8
    const HLS_URL = `http://localhost:8090/hls/${USER_ID}_${STREAM_ID}/index.m3u8`;
    // ────────────────────────────────────────────────────────────

    let mediaRecorder = null;
    let webSocket     = null;
    let localStream   = null;
    let hlsPlayer     = null;

    const startBtn   = document.getElementById("startBtn");
    const stopBtn    = document.getElementById("stopBtn");
    const localVideo = document.getElementById("localVideo");
    const remoteVideo= document.getElementById("remoteVideo");
    const statusEl   = document.getElementById("status");
    const dotEl      = document.getElementById("dot");

    function setStatus(msg, live = false) {
        statusEl.innerHTML = `<span class="dot ${live ? 'live' : ''}"></span>${msg}`;
    }

    // ── Start streaming ─────────────────────────────────────────
    startBtn.addEventListener("click", async () => {
        try {
            // Step 1: Request camera and microphone access
            localStream = await navigator.mediaDevices.getUserMedia({
                video: true,
                audio: true
            });

            // Show camera preview in left video tag
            localVideo.srcObject = localStream;

            setStatus("Connecting...");

            // Step 2: Open WebSocket connection to Spring Boot
            webSocket = new WebSocket(WS_URL);

            // Tell browser to give us binary data as ArrayBuffer
            webSocket.binaryType = "arraybuffer";

            // Wait for the WebSocket to be fully open before proceeding
            // We wrap the event listener in a Promise so we can await it
            await new Promise((resolve, reject) => {
                webSocket.addEventListener("open",  resolve);
                webSocket.addEventListener("error", reject);
            });

            setStatus("Starting MediaRecorder...");

            // Step 3: Create MediaRecorder — records the camera stream
            // mimeType: WebM container with VP8 video and Opus audio
            // This is what FFmpeg expects on the other end (-f webm)
            mediaRecorder = new MediaRecorder(localStream, {
                mimeType: "video/webm;codecs=vp8,opus"
            });

            // Step 4: Every time a chunk is ready, send it over WebSocket
            mediaRecorder.ondataavailable = (event) => {
                // event.data is a Blob of raw WebM binary data
                // Only send if we have data AND the WebSocket is still open
                if (event.data.size > 0 && webSocket.readyState === WebSocket.OPEN) {
                    webSocket.send(event.data);
                    // Spring Boot receives this as a BinaryMessage
                    // handleBinaryMessage() writes it to FFmpeg's stdin
                }
            };

            // Start recording — fire ondataavailable every 250ms
            // Lower = less latency but more WebSocket messages
            // Higher = more latency but fewer messages
            mediaRecorder.start(100);

            // Update UI
            startBtn.disabled = true;
            stopBtn.disabled  = false;
            setStatus("Streaming live", true);

            // Step 5: Start HLS playback after a short delay
            // Nginx needs time to receive RTMP data and write the first
            // .ts segment and m3u8 playlist file before we can load it
            // 6 seconds is safe — you can tune this lower (maybe 4s)
            setTimeout(startHlsPlayback, 6000);

        } catch (err) {
            setStatus("Error: " + err.message);
            console.error(err);
        }
    });

    // ── Stop streaming ──────────────────────────────────────────
    stopBtn.addEventListener("click", () => {
        // Stop MediaRecorder — no more chunks
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop();
        }

        // Close WebSocket — triggers afterConnectionClosed in Spring Boot
        // Spring Boot closes the FFmpeg stdin pipe → FFmpeg exits cleanly
        if (webSocket) {
            webSocket.close();
        }

        // Stop camera and microphone
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
        }

        // Stop HLS player
        if (hlsPlayer) {
            hlsPlayer.destroy();
            hlsPlayer = null;
        }

        // Reset UI
        startBtn.disabled = false;
        stopBtn.disabled  = true;
        setStatus("Stream stopped");
        localVideo.srcObject = null;
        remoteVideo.src = "";
    });

    // ── HLS Playback ────────────────────────────────────────────
    function startHlsPlayback() {
        if (Hls.isSupported()) {
            // Chrome, Firefox, Edge — use hls.js library
            hlsPlayer = new Hls({
                lowLatencyMode: true,    // stay as close to live as possible
                backBufferLength: 30,    // keep 30s of back buffer
            });

            hlsPlayer.loadSource(HLS_URL);
            hlsPlayer.attachMedia(remoteVideo);

            hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => {
                remoteVideo.play();
                setStatus("Live — watching HLS", true);
            });

            hlsPlayer.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    console.error("HLS fatal error:", data);
                    setStatus("HLS error — " + data.type);
                }
            });

        } else if (remoteVideo.canPlayType("application/vnd.apple.mpegurl")) {
            // Safari — has native HLS support, no library needed
            remoteVideo.src = HLS_URL;
            remoteVideo.addEventListener("loadedmetadata", () => {
                remoteVideo.play();
            });
        } else {
            setStatus("HLS not supported in this browser");
        }
    }
</script>

</body>
</html>
